<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Intel — Vyanet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c0f;
    --surface: #12161b;
    --surface2: #1a1f27;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f5;
    --text2: #8a93a2;
    --text3: #555f6e;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  #header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: white; }
  .logo-text { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); }
  #property-name { font-size: 13px; font-weight: 500; color: var(--text2); font-family: 'DM Mono', monospace; background: var(--surface2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  #map { flex: 1; position: relative; }
  #panel { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: transform 0.3s ease, width 0.3s ease; }
  #panel.hidden { transform: translateX(340px); width: 0; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .panel-address { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .close-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
  .close-btn:hover { background: var(--surface2); color: var(--text); }
  #panel-content { overflow-y: auto; flex: 1; padding: 12px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .view-section { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface2); }
  .view-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.15s; }
  .view-header:hover { background: rgba(255,255,255,0.03); }
  .view-badge { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .view-badge.nadir { background: #7c3aed; }
  .view-badge.deg360 { background: #059669; }
  .view-label { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; }
  .chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .view-body { display: block; }
  .view-body.collapsed { display: none; }
  .view-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; background: var(--surface); }
  .view-bullets { padding: 8px 12px; list-style: none; }
  .view-bullets li { font-size: 11px; color: var(--text2); padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
  .view-bullets li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }
  .btn-360 { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 12px 12px; padding: 9px; background: var(--accent); color: white; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
  .btn-360:hover { opacity: 0.85; }
  #error { position: absolute; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 200; padding: 32px; text-align: center; }
  .error-icon { font-size: 32px; color: var(--red); }
  .error-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .error-msg { font-size: 13px; color: var(--text3); max-width: 300px; line-height: 1.6; }
  #toggle-panel { position: absolute; bottom: 20px; right: 20px; z-index: 50; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  #toggle-panel:hover { background: var(--surface2); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @media (max-width: 640px) {
    #panel { position: absolute; top: 52px; right: 0; bottom: 0; width: 340px; z-index: 50; }
    #panel.hidden { transform: translateX(100%); width: 340px; }
    #toggle-panel { bottom: 16px; right: 16px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-mark">VI</div>
    <div>
      <div class="logo-text">Vyanet Intel</div>
      <div class="logo-sub">First Responder Portal</div>
    </div>
  </div>
  <div id="property-name">Loading...</div>
</div>

<div id="main">
  <div id="map">
    <div id="error">
      <div class="error-icon">⚠</div>
      <div class="error-title">Property not found</div>
      <div class="error-msg" id="error-msg">No property data provided.</div>
    </div>
  </div>
  <div id="panel" class="hidden">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panel-title">Property Details</div>
        <div class="panel-address" id="panel-address"></div>
      </div>
      <button class="close-btn" onclick="togglePanel()">✕</button>
    </div>
    <div id="panel-content"></div>
  </div>
</div>

<button id="toggle-panel" onclick="togglePanel()">
  <div class="status-dot"></div>
  <span id="toggle-label">View Intel</span>
</button>

<script>
let map, panelOpen = false;

function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('hidden', !panelOpen);
  document.getElementById('toggle-label').textContent = panelOpen ? 'Hide Intel' : 'View Intel';
  setTimeout(function() {
    if (map) google.maps.event.trigger(map, 'resize');
  }, 350);
}

function showError(msg) {
  document.getElementById('error').style.display = 'flex';
  document.getElementById('error-msg').textContent = msg;
}

function formatDesc(desc) {
  if (!desc) return [];
  return desc.split('|').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 2; });
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('collapsed');
  chevron.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
}

function buildPanel(d) {
  document.getElementById('panel-title').textContent = d.name || 'Property';
  document.getElementById('panel-address').textContent = d.address || '';
  document.getElementById('property-name').textContent = d.name || 'Property';

  const views = [
    { label: 'Alpha', badge: 'A', cls: '', data: d.alpha },
    { label: 'Bravo', badge: 'B', cls: '', data: d.bravo },
    { label: 'Charlie', badge: 'C', cls: '', data: d.charlie },
    { label: 'Delta', badge: 'D', cls: '', data: d.delta },
    { label: 'Nadir', badge: 'N', cls: 'nadir', data: d.nadir }
  ];

  let html = '';
  views.forEach(function(v) {
    if (!v.data || !v.data.url) return;
    const bullets = formatDesc(v.data.desc);
    html += '<div class="view-section">'
      + '<div class="view-header" onclick="toggleSection(this)">'
      + '<div class="view-badge ' + v.cls + '">' + v.badge + '</div>'
      + '<div class="view-label">' + v.label + '</div>'
      + '<div class="chevron">▼</div>'
      + '</div>'
      + '<div class="view-body">'
      + '<img class="view-img" src="' + v.data.url + '" alt="' + v.label + ' view" loading="lazy">'
      + '<ul class="view-bullets">' + bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('') + '</ul>'
      + '</div></div>';
  });

  if (d.viewer360) {
    html += '<div class="view-section">'
      + '<div class="view-header" onclick="toggleSection(this)">'
      + '<div class="view-badge deg360">360</div>'
      + '<div class="view-label">360° Aerial View</div>'
      + '<div class="chevron">▼</div>'
      + '</div>'
      + '<div class="view-body">'
      + '<ul class="view-bullets"><li>Full interactive drone flyover of the property</li><li>Pan, tilt, and zoom to explore every angle</li><li>Complete site overview before arrival</li></ul>'
      + '<a class="btn-360" href="' + d.viewer360 + '" target="_blank">↗ Launch 360° Viewer</a>'
      + '</div></div>';
  }

  document.getElementById('panel-content').innerHTML = html;
}

function initMap(lat, lng) {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: lat, lng: lng },
    zoom: 18,
    mapTypeId: google.maps.MapTypeId.SATELLITE,
    tilt: 0,
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
      mapTypeIds: ['satellite', 'hybrid', 'roadmap']
    },
    zoomControl: true,
    streetViewControl: true,
    fullscreenControl: true
  });

  const marker = new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map: map,
    animation: google.maps.Animation.DROP
  });

  marker.addListener('click', function() { if (!panelOpen) togglePanel(); });
  setTimeout(function() { if (!panelOpen) togglePanel(); }, 600);
}

window.initGoogleMaps = async function() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { showError('No property ID provided.'); return; }

  try {
    const res = await fetch('https://jonahbourgeois1.github.io/property-intel/data/' + id + '.json');
    if (!res.ok) { showError('Property "' + id + '" not found.'); return; }
    const d = await res.json();
    buildPanel(d);
    initMap(d.lat, d.lng);
  } catch(e) {
    showError('Failed to load property data: ' + e.message);
  }
};
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2tWrnRhCaicAwtp_32xe5zG5YGuntfuI&callback=initGoogleMaps"></script>
</body>
</html>
