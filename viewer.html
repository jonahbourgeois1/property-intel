<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Property Intel — Vyanet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c0f;
    --surface: #12161b;
    --surface2: #1a1f27;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f5;
    --text2: #8a93a2;
    --text3: #555f6e;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --header-h: 52px;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
  #header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: white; }
  .logo-text { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); }
  #property-name { font-size: 13px; font-weight: 500; color: var(--text2); font-family: 'DM Mono', monospace; background: var(--surface2); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; min-height: 0; position: relative; }
  #map { flex: 1; background: var(--bg); min-width: 0; }
  #panel { width: 680px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: transform 0.3s ease, width 0.3s ease; }
  #panel.hidden { transform: translateX(680px); width: 0; }

  /* ── OVERLAYS — outside map div ── */
  #loading {
    position: absolute;
    top: 0; left: 0; right: 680px; bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 500;
    transition: opacity 0.3s ease;
    pointer-events: all;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #error {
    position: absolute;
    top: 0; left: 0; right: 680px; bottom: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 500;
    padding: 32px;
    text-align: center;
    pointer-events: all;
  }
  #error.visible { display: flex; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .error-icon { font-size: 32px; color: var(--red); }
  .error-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .error-msg { font-size: 13px; color: var(--text3); max-width: 300px; line-height: 1.6; }

  /* ── VIEW TABS ── */
  #view-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  #view-tabs::-webkit-scrollbar { display: none; }
  .view-tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .view-tab:hover { color: var(--text2); background: rgba(255,255,255,0.02); }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PANEL ── */
  .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .panel-address { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .close-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
  .close-btn:hover { background: var(--surface2); color: var(--text); }
  #panel-content { overflow-y: auto; flex: 1; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

  /* ── VIEW SECTIONS ── */
  .view-section { margin-bottom: 14px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface2); }
  .view-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: background 0.15s; }
  .view-header:hover { background: rgba(255,255,255,0.03); }
  .view-badge { width: 22px; height: 22px; border-radius: 5px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: white; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .view-badge.nadir { background: #7c3aed; }
  .view-badge.deg360 { background: #059669; }
  .view-label { font-size: 12px; font-weight: 500; color: var(--text); flex: 1; }
  .chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .view-body { display: block; }
  .view-body.collapsed { display: none; }
  .view-img-wrap { position: relative; cursor: zoom-in; overflow: hidden; }
  .view-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface); transition: transform 0.2s ease; }
  .view-img-wrap:hover .view-img { transform: scale(1.02); }
  .zoom-hint { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 3px 7px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .view-img-wrap:hover .zoom-hint { opacity: 1; }
  .view-bullets { padding: 10px 14px; list-style: none; }
  .view-bullets li { font-size: 12px; color: var(--text2); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.6; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .view-bullets li:last-child { border-bottom: none; }
  .view-bullets li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 7px; }
  .btn-360 { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 14px 14px; padding: 10px; background: var(--accent); color: white; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; transition: opacity 0.15s; }
  .btn-360:hover { opacity: 0.85; }

  /* ── LIGHTBOX ── */
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  #lightbox.open { display: flex; }
  #lightbox-img { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: 8px; }
  #lightbox-caption { margin-top: 16px; text-align: center; }
  #lightbox-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  #lightbox-bullets { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 8px; max-width: 700px; }
  #lightbox-bullets li { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px; }
  #lightbox-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #lightbox-nav { display: flex; align-items: center; gap: 16px; margin-top: 16px; }
  .nav-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  #lightbox-counter { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* ── TOGGLE BUTTONS ── */
  #toggle-panel { position: absolute; bottom: 20px; right: 20px; z-index: 50; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  #toggle-panel:hover { background: var(--surface2); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  #mobile-toggle { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 50; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; align-items: center; gap: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }

  /* ── DEBUG ── */
  #debug-bar { background: #0d1117; border-top: 1px solid var(--border2); flex-shrink: 0; }
  #debug-toggle { width: 100%; padding: 6px 12px; background: transparent; border: none; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; }
  #debug-console { display: none; height: 160px; overflow-y: auto; padding: 8px 12px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  #debug-console.open { display: block; }
  .log-line { font-family: 'DM Mono', monospace; font-size: 11px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 10px; }
  .log-time { color: var(--text3); flex-shrink: 0; }
  .log-info { color: #60a5fa; }
  .log-success { color: var(--green); }
  .log-warn { color: var(--amber); }
  .log-error { color: var(--red); }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    #property-name { display: none; }
    #toggle-panel { display: none; }
    #mobile-toggle { display: flex; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }
    #loading { right: 0; }
    #error { right: 0; }
    #panel {
      position: fixed !important;
      left: 0; right: 0; bottom: 0;
      top: var(--header-h);
      width: 100% !important;
      height: calc(100dvh - var(--header-h)) !important;
      transform: translateY(100%) !important;
      transition: transform 0.35s ease !important;
      border-left: none !important;
      border-top: 1px solid var(--border2) !important;
      z-index: 40;
    }
    #panel.mobile-open { transform: translateY(0%) !important; }
    .close-btn { display: none; }
    .panel-header { padding: 10px 14px; }
    .panel-title { font-size: 13px; }
    .panel-address { font-size: 10px; }
    #panel-content { padding: 10px; }
    .view-bullets li { font-size: 11px; }
    .view-label { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-mark">VI</div>
    <div>
      <div class="logo-text">Vyanet Intel</div>
      <div class="logo-sub">First Responder Portal</div>
    </div>
  </div>
  <div id="property-name">Loading...</div>
</div>

<div id="main">
  <div id="map"></div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading property data...</div>
  </div>
  <div id="error">
    <div class="error-icon">⚠</div>
    <div class="error-title">Property not found</div>
    <div class="error-msg" id="error-msg">No property data provided.</div>
  </div>

  <div id="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panel-title">Property Details</div>
        <div class="panel-address" id="panel-address"></div>
      </div>
      <button class="close-btn" onclick="togglePanel()">✕</button>
    </div>
    <div id="view-tabs"></div>
    <div id="panel-content"></div>
  </div>
</div>

<button id="toggle-panel" onclick="togglePanel()">
  <div class="status-dot"></div>
  <span id="toggle-label">View Intel</span>
</button>

<button id="mobile-toggle" onclick="mobileToggle()">
  <div class="status-dot"></div>
  <span id="mobile-label">Show Intel</span>
</button>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption">
    <div id="lightbox-title"></div>
    <ul id="lightbox-bullets"></ul>
  </div>
  <div id="lightbox-nav">
    <button class="nav-btn" onclick="lightboxNav(-1)">&#8592;</button>
    <span id="lightbox-counter"></span>
    <button class="nav-btn" onclick="lightboxNav(1)">&#8594;</button>
  </div>
</div>

<div id="debug-bar">
  <button id="debug-toggle" onclick="toggleDebug()">
    <span id="debug-arrow">▶</span> Debug Console <span id="debug-count" style="color:var(--accent)">[0 logs]</span>
  </button>
  <div id="debug-console"></div>
</div>

<script>
let map, panelOpen = false, mobileIntelOpen = false;
let lightboxViews = [], lightboxIndex = 0;
let propertyIndex = null;
let currentViewData = null;
let currentViews = null;
let mapsApiReady = false;
let pendingEntry = null;
let debugOpen = false;
let logCount = 0;
const BASE_URL = 'https://jonahbourgeois1.github.io/property-intel/data/';
const GEOCODE_KEY = (typeof CONFIG !== 'undefined') ? CONFIG.GEOCODE_KEY : '';
const isMobile = () => window.innerWidth <= 768;

// ── DEBUG ──
function toggleDebug() {
  debugOpen = !debugOpen;
  document.getElementById('debug-console').classList.toggle('open', debugOpen);
  document.getElementById('debug-arrow').textContent = debugOpen ? '▼' : '▶';
}

function dbg(msg, type) {
  type = type || 'info';
  logCount++;
  document.getElementById('debug-count').textContent = '[' + logCount + ' logs]';
  const now = new Date();
  const time = now.toTimeString().split(' ')[0];
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = '<span class="log-time">' + time + '</span><span class="log-' + type + '">' + msg + '</span>';
  const con = document.getElementById('debug-console');
  con.appendChild(line);
  con.scrollTop = con.scrollHeight;
  if (!debugOpen) toggleDebug();
}

window.onerror = function(msg, src, line) {
  dbg('JS Error: ' + msg + ' (line ' + line + ')', 'error');
};

// ── PANEL TOGGLE ──
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('panel').classList.toggle('hidden', !panelOpen);
  document.getElementById('toggle-label').textContent = panelOpen ? 'Hide Intel' : 'View Intel';
  setTimeout(function() { if (map) google.maps.event.trigger(map, 'resize'); }, 350);
}

function mobileToggle() {
  mobileIntelOpen = !mobileIntelOpen;
  document.getElementById('panel').classList.toggle('mobile-open', mobileIntelOpen);
  document.getElementById('mobile-label').textContent = mobileIntelOpen ? 'Show Map' : 'Show Intel';
  setTimeout(function() { if (map) google.maps.event.trigger(map, 'resize'); }, 380);
}

// ── LOADING / ERROR ──
function showError(msg) {
  dbg('ERROR: ' + msg, 'error');
  hideLoading();
  document.getElementById('error').classList.add('visible');
  document.getElementById('error-msg').textContent = msg;
}

function setLoading(msg) {
  dbg(msg, 'info');
  const el = document.getElementById('loading-text');
  if (el) el.textContent = msg;
}

function hideLoading() {
  dbg('Hiding loading overlay', 'success');
  const el = document.getElementById('loading');
  if (el) el.classList.add('hidden');
}

// ── HELPERS ──
function formatDesc(desc) {
  if (!desc) return [];
  return desc.split('|').map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 2; });
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('collapsed');
  chevron.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
}

// ── MAP INIT ──
function initMap(lat, lng) {
  dbg('initMap: lat=' + lat + ' lng=' + lng, 'info');
  try {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: lat, lng: lng },
      zoom: 18,
      mapTypeId: google.maps.MapTypeId.SATELLITE,
      tilt: 0,
      mapTypeControl: true,
      mapTypeControlOptions: {
        style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
        mapTypeIds: ['satellite', 'hybrid', 'roadmap']
      },
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
      streetViewControl: true,
      streetViewControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
      fullscreenControl: true,
      fullscreenControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP }
    });
    dbg('Map created', 'success');

    new google.maps.Marker({
      position: { lat: lat, lng: lng },
      map: map,
      animation: google.maps.Animation.DROP
    });
    dbg('Marker added', 'success');

    hideLoading();

    setTimeout(function() {
      if (map) {
        google.maps.event.trigger(map, 'resize');
        map.setCenter({ lat: lat, lng: lng });
        dbg('Map resized and centered', 'success');
      }
    }, 100);

    if (!isMobile()) {
      setTimeout(function() { if (!panelOpen) togglePanel(); }, 700);
    }
  } catch(e) {
    dbg('initMap exception: ' + e.message, 'error');
  }
}

// ── RESOLVE MAP ──
function resolveAndInitMap(entry) {
  dbg('resolveAndInitMap: lat=' + entry.lat + ' lng=' + entry.lng, 'info');

  if (entry.lat && entry.lng) {
    dbg('Using stored coordinates', 'success');
    initMap(entry.lat, entry.lng);
  } else {
    dbg('No coordinates — geocoding', 'warn');
    setLoading('Locating property...');
    const cleanAddress = entry.address.replace(/^\s+/, '');
    dbg('Geocoding: ' + cleanAddress, 'info');
    fetch('https://maps.googleapis.com/maps/api/geocode/json?address='
      + encodeURIComponent(cleanAddress)
      + '&key=' + GEOCODE_KEY)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        dbg('Geocode status: ' + data.status, data.status === 'OK' ? 'success' : 'error');
        if (data.status === 'OK' && data.results[0]) {
          const loc = data.results[0].geometry.location;
          dbg('Geocoded: ' + loc.lat + ', ' + loc.lng, 'success');
          initMap(loc.lat, loc.lng);
        } else {
          dbg('Geocode failed', 'error');
          hideLoading();
          if (!isMobile()) {
            setTimeout(function() { if (!panelOpen) togglePanel(); }, 600);
          }
        }
      })
      .catch(function(e) {
        dbg('Geocode fetch error: ' + e.message, 'error');
        hideLoading();
      });
  }
}

// ── LIGHTBOX ──
function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.addEventListener('keydown', lightboxKey);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lightboxKey);
}

function lightboxKey(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
}

function lightboxNav(dir) {
  lightboxIndex = (lightboxIndex + dir + lightboxViews.length) % lightboxViews.length;
  updateLightbox();
}

function updateLightbox() {
  const v = lightboxViews[lightboxIndex];
  document.getElementById('lightbox-img').src = v.url;
  document.getElementById('lightbox-title').textContent = v.label;
  document.getElementById('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + lightboxViews.length;
  const ul = document.getElementById('lightbox-bullets');
  ul.innerHTML = v.bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('');
}

// ── TABS ──
function buildTabs(views, activeView) {
  const tabsEl = document.getElementById('view-tabs');
  const viewOrder = ['satellite', 'plane', 'drone', 'interior'];
  const viewLabels = { satellite: 'Satellite', plane: 'Plane', drone: 'Drone', interior: 'Interior' };

  tabsEl.innerHTML = '';
  viewOrder.forEach(function(v) {
    if (!views[v]) return;
    const tab = document.createElement('div');
    tab.className = 'view-tab' + (v === activeView ? ' active' : '');
    tab.textContent = viewLabels[v] || v;
    tab.setAttribute('data-view', v);
    tab.onclick = function() { loadView(currentViews, v); };
    tabsEl.appendChild(tab);
    dbg('Tab: ' + v, 'info');
  });
}

// ── PANEL CONTENT ──
function buildPanel(d) {
  const views = [
    { label: 'Alpha',   badge: 'A', cls: '',      data: d.alpha },
    { label: 'Bravo',   badge: 'B', cls: '',      data: d.bravo },
    { label: 'Charlie', badge: 'C', cls: '',      data: d.charlie },
    { label: 'Delta',   badge: 'D', cls: '',      data: d.delta },
    { label: 'Nadir',   badge: 'N', cls: 'nadir', data: d.nadir }
  ];

  lightboxViews = [];
  views.forEach(function(v) {
    if (v.data && v.data.url) {
      lightboxViews.push({ label: v.label, url: v.data.url, bullets: formatDesc(v.data.desc) });
    }
  });

  let html = '';
  let lbIndex = 0;
  views.forEach(function(v) {
    if (!v.data || !v.data.url) return;
    const bullets = formatDesc(v.data.desc);
    const idx = lbIndex++;
    html += '<div class="view-section">'
      + '<div class="view-header" onclick="toggleSection(this)">'
      + '<div class="view-badge ' + v.cls + '">' + v.badge + '</div>'
      + '<div class="view-label">' + v.label + '</div>'
      + '<div class="chevron">▼</div>'
      + '</div>'
      + '<div class="view-body">'
      + '<div class="view-img-wrap" onclick="openLightbox(' + idx + ')">'
      + '<img class="view-img" src="' + v.data.url + '" alt="' + v.label + '" loading="lazy">'
      + '<div class="zoom-hint">🔍 Tap to enlarge</div>'
      + '</div>'
      + '<ul class="view-bullets">'
      + bullets.map(function(b) { return '<li>' + b + '</li>'; }).join('')
      + '</ul>'
      + '</div></div>';
  });

  if (d.viewer360) {
    html += '<div class="view-section">'
      + '<div class="view-header" onclick="toggleSection(this)">'
      + '<div class="view-badge deg360">360</div>'
      + '<div class="view-label">360° Aerial View</div>'
      + '<div class="chevron">▼</div>'
      + '</div>'
      + '<div class="view-body">'
      + '<ul class="view-bullets">'
      + '<li>Full interactive drone flyover of the property</li>'
      + '<li>Pan, tilt, and zoom to explore every angle</li>'
      + '<li>Complete site overview before arrival</li>'
      + '</ul>'
      + '<a class="btn-360" href="' + d.viewer360 + '" target="_blank">↗ Launch 360° Viewer</a>'
      + '</div></div>';
  }

  document.getElementById('panel-content').innerHTML = html;
  dbg('Panel built', 'success');
}

// ── LOAD VIEW ──
async function loadView(views, viewSuffix) {
  const hashedViewId = views[viewSuffix];
  if (!hashedViewId) { dbg('No hash for: ' + viewSuffix, 'error'); return; }

  dbg('Loading view: ' + viewSuffix, 'info');
  document.querySelectorAll('.view-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-view') === viewSuffix);
  });

  document.getElementById('panel-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px;font-family:\'DM Mono\',monospace;">Loading ' + viewSuffix + '...</div>';

  try {
    const res = await fetch(BASE_URL + hashedViewId + '.json');
    dbg('View fetch: ' + res.status, res.ok ? 'success' : 'error');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    currentViewData = d;
    buildPanel(d);
  } catch(e) {
    dbg('loadView error: ' + e.message, 'error');
    document.getElementById('panel-content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red);font-size:13px;">Failed: ' + e.message + '</div>';
  }
}

// ── LOAD PROPERTY ──
async function loadPropertyData() {
  dbg('URL: ' + window.location.href, 'info');
  const propertyHash = new URLSearchParams(window.location.search).get('property');
  dbg('Hash: ' + (propertyHash || 'MISSING'), propertyHash ? 'info' : 'error');
  if (!propertyHash) { showError('No property ID provided.'); return; }

  try {
    setLoading('Loading property index...');
    const indexRes = await fetch(BASE_URL + 'index.json');
    dbg('Index: ' + indexRes.status, indexRes.ok ? 'success' : 'error');
    if (!indexRes.ok) { showError('Index not found.'); return; }
    propertyIndex = await indexRes.json();
    dbg('Index loaded: ' + Object.keys(propertyIndex).length + ' properties', 'success');

    const entry = propertyIndex[propertyHash];
    dbg('Entry: ' + (entry ? entry.name : 'NOT FOUND'), entry ? 'success' : 'error');
    if (!entry) { showError('Property not found.'); return; }

    currentViews = entry.views;
    dbg('Views: ' + Object.keys(entry.views).join(', '), 'info');
    dbg('Coords: ' + (entry.lat ? entry.lat + ', ' + entry.lng : 'NONE'), entry.lat ? 'success' : 'warn');

    document.getElementById('property-name').textContent = entry.name;
    document.getElementById('panel-title').textContent = entry.name;
    document.getElementById('panel-address').textContent = entry.address.replace(/^\s+/, '');

    const viewOrder = ['satellite', 'plane', 'drone', 'interior'];
    const firstView = viewOrder.find(function(v) { return entry.views[v]; });
    if (!firstView) { showError('No views available.'); return; }
    dbg('First view: ' + firstView, 'info');

    buildTabs(entry.views, firstView);
    setLoading('Loading ' + firstView + '...');
    await loadView(entry.views, firstView);

    dbg('mapsApiReady: ' + mapsApiReady, 'info');
    if (mapsApiReady) {
      resolveAndInitMap(entry);
    } else {
      dbg('Waiting for Maps API...', 'warn');
      pendingEntry = entry;
    }

  } catch(e) {
    dbg('loadPropertyData error: ' + e.message, 'error');
    showError('Failed: ' + e.message);
  }
}

// ── MAPS API CALLBACK ──
window.initGoogleMaps = function() {
  dbg('Maps API ready', 'success');
  mapsApiReady = true;
  if (pendingEntry) {
    dbg('Processing pending: ' + pendingEntry.name, 'info');
    resolveAndInitMap(pendingEntry);
    pendingEntry = null;
  }
};

dbg('Script init', 'info');
loadPropertyData();
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2tWrnRhCaicAwtp_32xe5zG5YGuntfuI&callback=initGoogleMaps"></script>
