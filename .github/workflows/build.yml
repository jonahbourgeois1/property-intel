name: Build config

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate config.js
        run: |
          echo "const CONFIG = { GEOCODE_KEY: '${{ secrets.GEOCODE_API_KEY }}' };" > config.js

      - name: Commit config.js
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.js
          git diff --staged --quiet || git commit -m "Update config"
          git push
